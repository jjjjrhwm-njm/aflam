<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نجم فليكس</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #141414;
            --primary-red: #E50914;
            --text-light: #e5e5e5;
        }

        body {
            font-family: 'Cairo', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-light);
            margin: 0;
            padding: 0;
            -webkit-tap-highlight-color: transparent;
        }

        /* نافيجشن بار (الهيدر) */
        header {
            background: linear-gradient(180deg, rgba(0,0,0,0.9) 0%, transparent 100%);
            padding: 15px 20px;
            position: fixed;
            top: 0;
            width: 100%;
            z-index: 100;
            box-sizing: border-box;
        }

        header h1 {
            margin: 0;
            color: var(--primary-red);
            font-weight: 900;
            font-size: 28px;
            letter-spacing: 1px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        /* حاوية الأفلام - نظام شبكي للجوال */
        .movies-container {
            padding: 80px 15px 20px 15px; /* مسافة من الأعلى بسبب الهيدر الثابت */
            display: grid;
            grid-template-columns: repeat(2, 1fr); /* فيلمين في كل صف للجوال */
            gap: 12px;
        }

        /* شاشات أكبر (الكمبيوتر والتابلت) */
        @media (min-width: 768px) {
            .movies-container { grid-template-columns: repeat(4, 1fr); gap: 20px; padding: 100px 40px 40px; }
            header h1 { font-size: 40px; }
        }

        /* كرت الفيلم */
        .movie-card {
            position: relative;
            border-radius: 6px;
            overflow: hidden;
            background-color: #222;
            cursor: pointer;
            aspect-ratio: 2 / 3;
            transition: transform 0.2s ease;
        }

        .movie-card:active {
            transform: scale(0.95); /* تأثير الضغط في الجوال */
        }

        .movie-card img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* أيقونة التشغيل واسم الفيلم */
        .play-icon {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 40px;
            height: 40px;
            background-color: rgba(0,0,0,0.6);
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            border: 2px solid white;
            opacity: 0.8;
        }
        .play-icon::after {
            content: '';
            border-style: solid;
            border-width: 10px 0 10px 16px;
            border-color: transparent transparent transparent white;
            margin-left: 4px;
        }

        .movie-title {
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            background: linear-gradient(0deg, #141414 0%, transparent 100%);
            padding: 20px 10px 10px;
            margin: 0;
            font-size: 13px;
            font-weight: 700;
            text-align: center;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* المشغل الداخلي */
        .modal {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background-color: #000;
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-content {
            width: 100%;
            height: 100%;
            max-height: 100vh;
        }

        @media (min-width: 768px) {
            .modal-content { width: 80%; height: 80%; border-radius: 10px; overflow: hidden; }
        }

        iframe {
            width: 100%;
            height: 100%;
            border: none;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: white;
            font-size: 35px;
            z-index: 1001;
            cursor: pointer;
            background: rgba(0,0,0,0.5);
            width: 40px; height: 40px;
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
        }

        .loading { text-align: center; padding-top: 100px; color: #666; font-weight: bold; }
    </style>
</head>
<body>

    <header>
        <h1>نجم فليكس</h1>
    </header>

    <div id="loading" class="loading">جاري تجهيز الأفلام...</div>
    
    <div class="movies-container" id="movies-container">
        </div>

    <div id="videoModal" class="modal">
        <div class="close-btn" onclick="closePlayer()">&times;</div>
        <div class="modal-content">
            <iframe id="videoPlayer" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <script>
        const API_URL = 'https://aflam-ehhy.onrender.com/movies';
        const container = document.getElementById('movies-container');
        const loadingDiv = document.getElementById('loading');
        const modal = document.getElementById('videoModal');
        const videoPlayer = document.getElementById('videoPlayer');

        function getYouTubeId(url) {
            const regExp = /^.*(youtu.be\/|v\/|u\/\w\/|embed\/|watch\?v=|\&v=)([^#\&\?]*).*/;
            const match = url.match(regExp);
            return (match && match[2].length === 11) ? match[2] : null;
        }

        function playMovie(ytId) {
            // المعاملات الخاصة بيوتيوب لتشغيل أنظف
            const embedUrl = `https://www.youtube-nocookie.com/embed/${ytId}?autoplay=1&modestbranding=1&rel=0&showinfo=0&fs=1`;
            videoPlayer.src = embedUrl;
            modal.style.display = 'flex';
        }

        function closePlayer() {
            modal.style.display = 'none';
            videoPlayer.src = ''; 
        }

        async function fetchMovies() {
            try {
                const response = await fetch(API_URL);
                const movies = await response.json();
                loadingDiv.style.display = 'none';

                movies.forEach(movie => {
                    const ytId = getYouTubeId(movie.link);
                    if (!ytId) return;

                    // محاولة جلب صورة عالية الجودة، وإن فشلت نأخذ العادية
                    const imageUrl = `https://img.youtube.com/vi/${ytId}/hqdefault.jpg`;

                    const card = document.createElement('div');
                    card.className = 'movie-card';
                    card.onclick = () => playMovie(ytId);
                    
                    card.innerHTML = `
                        <img src="${imageUrl}" alt="${movie.title}">
                        <div class="play-icon"></div>
                        <h3 class="movie-title">${movie.title}</h3>
                    `;
                    container.appendChild(card);
                });

            } catch (error) {
                loadingDiv.innerHTML = '❌ عذراً، لم نتمكن من الاتصال بالخوادم.';
            }
        }

        fetchMovies();
    </script>
</body>
</html>
