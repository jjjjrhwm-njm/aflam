<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>نجم فليكس | Najm Flex</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <header>
        <div class="header-content">
            <h1>نجم فليكس</h1>
            <nav class="categories">
                <button class="active" onclick="filterContent('all', this)">الكل</button>
                <button onclick="filterContent('movie', this)">الأفلام</button>
                <button onclick="filterContent('series', this)">المسلسلات</button>
            </nav>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." onkeyup="searchContent()">
            </div>
        </div>
    </header>

    <main>
        <div id="loading" class="loading">جاري جلب المحتوى من القاعدة... ⏳</div>
        <div class="movies-container" id="movies-container">
            </div>
    </main>

    <div id="videoModal" class="modal">
        <div class="close-btn" onclick="closePlayer()">&times;</div>
        <div class="modal-content">
            <iframe id="videoPlayer" allow="autoplay; fullscreen" allowfullscreen></iframe>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
