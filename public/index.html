<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>StreamFlix Pro | Netflix Style</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- Loading Overlay -->
    <div id="loadingOverlay" class="loading-overlay">
        <div class="loading-spinner"></div>
    </div>

    <!-- Navbar Netflix Style -->
    <header id="navbar">
        <div class="nav-container">
            <div class="brand">
                <h1>STREAM<span>FLIX</span></h1>
            </div>
            <nav class="main-nav">
                <button class="nav-btn active" data-filter="all">الرئيسية</button>
                <button class="nav-btn" data-filter="movie">أفلام</button>
                <button class="nav-btn" data-filter="series">مسلسلات</button>
                <button class="nav-btn" data-filter="favorites">قائمتي</button>
            </nav>
            <div class="search-box">
                <i class="fa-solid fa-search"></i>
                <input type="text" id="searchInput" placeholder="عنوان، ممثل، تصنيف...">
            </div>
            <button class="mobile-menu-btn" id="mobileMenuBtn"><i class="fa-solid fa-bars"></i></button>
        </div>
        <div class="mobile-menu" id="mobileMenu">
            <button class="close-mobile" id="closeMobileMenu"><i class="fa-solid fa-xmark"></i></button>
            <div class="mobile-menu-links">
                <button class="mobile-nav-btn active" data-filter="all">الرئيسية</button>
                <button class="mobile-nav-btn" data-filter="movie">أفلام</button>
                <button class="mobile-nav-btn" data-filter="series">مسلسلات</button>
                <button class="mobile-nav-btn" data-filter="favorites">قائمتي</button>
            </div>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="hero" class="hero">
        <div class="hero-background" id="heroBg"></div>
        <div class="hero-content">
            <h1 id="heroTitle"></h1>
            <div class="hero-meta">
                <span id="heroYear"></span>
                <span id="heroRating"><i class="fa-solid fa-star"></i> <span></span></span>
                <span id="heroDuration"></span>
            </div>
            <p id="heroDesc"></p>
            <div class="hero-buttons">
                <button id="heroPlayBtn" class="btn-play"><i class="fa-solid fa-play"></i> تشغيل</button>
                <button id="heroFavBtn" class="btn-fav"><i class="fa-regular fa-heart"></i> قائمتي</button>
            </div>
        </div>
    </section>

    <!-- Main Content -->
    <main class="content">
        <div id="skeleton" class="skeleton-grid" style="display: flex;"></div>
        <div id="moviesGrid" class="movies-grid" style="display: none;"></div>
        <div id="noResults" class="empty-state" style="display: none;">
            <i class="fa-solid fa-face-frown"></i>
            <h3>لا توجد نتائج</h3>
        </div>
    </main>

    <!-- Player Modal -->
    <div id="playerModal" class="player-modal">
        <div class="player-container">
            <button id="closePlayerBtn" class="close-player"><i class="fa-solid fa-xmark"></i></button>
            <div class="video-wrapper">
                <video id="playerVideo" controls></video>
            </div>
        </div>
    </div>

    <!-- Toast -->
    <div id="toast" class="toast"></div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
    <script src="script.js"></script>
</body>
</html>
