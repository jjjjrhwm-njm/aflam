<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>StreamFlix Pro</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="stylesheet" href="https://cdn.plyr.io/3.7.8/plyr.css" />
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <header class="navbar" id="navbar">
        <div class="logo">Stream<span>Flix</span></div>
        <div class="user-status" id="userStatus">⏳ جاري التحقق...</div>
    </header>

    <section class="hero" id="heroSection">
        <div class="hero-overlay"></div>
        <div class="hero-content">
            <h1 id="heroTitle">جاري التحميل...</h1>
            <div class="tags">
                <span id="heroType" class="tag vip">VIP</span>
                <span class="tag hd">4K Ultra HD</span>
            </div>
            <div class="buttons">
                <button id="heroPlayBtn" class="btn play"><i class="icon-play">▶</i> تشغيل</button>
            </div>
        </div>
    </section>

    <main class="content-sections">
        <h2 class="section-title">مضاف حديثاً (عام)</h2>
        <div class="slider-container" id="publicMoviesGrid"></div>

        <h2 class="section-title vip-title">حصرياً للمشتركين 👑</h2>
        <div class="slider-container" id="vipMoviesGrid"></div>
    </main>

    <div id="playerModal" class="modal hidden">
        <div class="modal-header">
            <span id="playerTitle" class="player-title"></span>
            <button class="close-btn" id="closePlayerBtn">✖</button>
        </div>
        <div class="video-wrapper">
            <video id="plyr-video" class="plyr-video-player" controls playsinline></video>
        </div>
    </div>

    <script src="https://cdn.plyr.io/3.7.8/plyr.js"></script>
    <script src="/js/api.js"></script>
    <script src="/js/ui.js"></script>
    <script src="/js/app.js"></script>
</body>
</html>
