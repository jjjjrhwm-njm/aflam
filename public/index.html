<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>njmflix Pro | منصة نجم الإبداع</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header id="appHeader">
        <div class="header-main">
            <div class="brand-zone">
                <span class="logo-icon">★</span>
                <h1 class="main-logo">njmflix</h1>
            </div>
            <div class="search-box">
                <input type="text" id="searchInput" placeholder="ابحث عن فيلم أو مسلسل..." oninput="logic.search(this.value)">
            </div>
        </div>
        <nav class="category-bar">
            <button class="cat-item active" data-type="all" onclick="logic.filter('all', this)">الكل</button>
            <button class="cat-item" data-type="movie" onclick="logic.filter('movie', this)">الأفلام</button>
            <button class="cat-item" data-type="series" onclick="logic.filter('series', this)">المسلسلات</button>
        </nav>
    </header>

    <main id="mainGallery">
        <div id="loadingState" class="status-layer">
            <div class="spinner"></div>
            <p>جاري مزامنة المكتبة السينمائية...</p>
        </div>
        <div class="movie-grid" id="movieGrid"></div>
    </main>

    <div id="masterPlayer" class="player-overlay">
        <div class="player-header">
            <button class="exit-btn" onclick="ui.closePlayer()">✕ إغلاق العرض</button>
            <span class="now-playing" id="videoTitleDisplay">جاري العرض...</span>
        </div>
        
        <div class="video-universe">
            <div class="clipping-mask">
                <div class="my-watermark">njmflix Original</div>
                
                <div class="interaction-shield"></div>
                
                <iframe id="globalIframe" 
                        frameborder="0" 
                        allow="autoplay; fullscreen; picture-in-picture" 
                        allowfullscreen>
                </iframe>
            </div>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
